<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Kirong AI 🌍💜</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="header-left">
        <h1>Meta Kirong AI 🌍</h1>
        <select id="language-select" class="lang-select"> <!-- NILIBADILISHA ID -->
          <option value="English">English</option>
          <option value="Swahili">Kiswahili</option>
          <option value="French">French</option>
          <option value="Hindi">Hindi</option>
          <option value="Spanish">Spanish</option>
        </select>
      </div>
      <button id="themeBtn" class="icon-btn" title="Toggle Theme">🌙</button>
    </header>

    <div id="chat-box"> <!-- NILIBADILISHA ID kutoka chatBox -->
      <div class="message bot"> <!-- NILIBADILISHA CLASS -->
        <p>Habari mkuu! I'm Meta Kirong AI 💜🔥<br>Your Universal Assistant. I code, teach, design, write, and help with anything.</p>
      </div>
    </div>

    <div id="thinking" class="hidden">Meta Kirong is thinking...</div> <!-- NILIBADILISHA ID -->

    <div class="action-buttons"> <!-- NILIBADILISHA CLASS -->
      <button class="action-btn" data-action="Code">Code 💻</button> <!-- NILIONGEZA data-action -->
      <button class="action-btn" data-action="Image">Image 🎨</button>
      <button class="action-btn" data-action="Explain">Explain 🧠</button>
      <button class="action-btn" data-action="Write">Write ✍️</button>
      <button class="action-btn" data-action="Email">Email 📧</button>
      <button id="pinBtn" class="action-btn">Pin 📌</button>
      <button id="locationBtn" class="action-btn">Location 📍</button>
    </div>

    <div class="input-area">
      <select id="voice-select" title="Voice"> <!-- NILIBADILISHA ID -->
        <option value="en-US">EN Voice</option>
        <option value="en-GB">UK Voice</option>
        <option value="sw-KE">SW Voice</option>
      </select>
      <button id="uploadBtn" title="Upload File">📎</button>
      <input type="file" id="fileInput" hidden>
      <input type="text" id="user-input" placeholder="Ask Meta Kirong anything..." autocomplete="off"> <!-- NILIONGEZA autocomplete -->
      <button id="micBtn" title="Speak">🎤</button>
      <button id="send-btn">Send</button> <!-- NILIBADILISHA ID -->
    </div>

    <div class="footer-btns">
      <button id="exportBtn">Export Chat 💾</button>
      <button id="clear-btn">Clear Chat 🗑️</button> <!-- NILIBADILISHA ID -->
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
