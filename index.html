<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirong Job AI 👑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <!-- HEADER -->
    <div class="header">
      <h1>Kirong Job AI 💜</h1>
      <button id="themeBtn">🌙</button>
    </div>

    <!-- CHAT BOX -->
    <div id="chatBox">
      <div class="message ai-message">
        <p>Habari ${localStorage.getItem('kirongName') || 'Mkuu'}! Niko hapa kukusaidia 💜</p>
      </div>
    </div>
    
    <div id="typing" class="hidden">Kirong anaandika...</div>

    <!-- BUTTONS ZOTE CHINI -->
    <div class="bottom-controls">
      <button id="micBtn">🎤 Voice</button>
      <button id="uploadBtn">📎 Upload</button>
      <button id="pdfBtn">📄 PDF</button>
      <button id="pinBtn">📌 Favorites</button>
      <button id="locationBtn">📍 Location</button>
      <button id="clearBtn">🗑️ Clear</button>
      <button id="exportBtn">⬇️ Export</button>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <select id="personalitySelect">
        <option value="Normal">Normal</option>
        <option value="Funny">Funny 😂</option>
        <option value="Teacher">Teacher 🧠</option>
        <option value="Hustler">Hustler 💪</option>
      </select>
      <input type="text" id="userInput" placeholder="Ask Kirong Job anything...">
      <button id="sendBtn">Send</button>
    </div>

    <!-- HIDDEN FILE INPUT -->
    <input type="file" id="fileInput" style="display:none;">

  </div>

  <script src="app.js"></script>
</body>
</html>
