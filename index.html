<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job AI by Kirong 👑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>Job AI by Kirong 💜</h1>
      </div>
      <button id="themeBtn" class="icon-btn">🌙</button>
    </div>

    <div id="chatBox">
      <div class="message ai-message">
        <p id="welcomeMsg">Hello! I'm Job AI by Kirong. How can I help you today? 💜</p>
      </div>
    </div>

    <div id="typing" class="hidden">Job AI is typing...</div>

    <!-- QUICK BTNS -->
    <div class="quick-btns">
      <button class="quick-btn" data-prompt="Write my CV">📄 CV</button>
      <button class="quick-btn" data-prompt="Help me find a job">💼 Jobs</button>
      <button class="quick-btn" data-prompt="Generate an image of">🎨 Image</button>
      <button class="quick-btn" data-prompt="Latest news">📰 News</button>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottom-controls">
      <button id="micBtn">🎤 Voice</button>
      <button id="uploadBtn">📎 Upload</button>
      <button id="pdfBtn">📄 PDF</button>
      <button id="pinBtn">📌 Favorites</button>
      <button id="locationBtn">📍 Location</button>
      <button id="clearBtn">🗑️ Clear</button>
      <button id="exportBtn">⬇️ Export</button>
    </div>

    <div class="input-area">
      <select id="personalitySelect">
        <option value="Normal">Normal</option>
        <option value="Funny">Funny 😂</option>
        <option value="Teacher">Teacher 🧠</option>
        <option value="Hustler">Hustler 💪</option>
      </select>
      <input type="text" id="userInput" placeholder="Ask Job AI anything...">
      <button id="sendBtn">Send</button>
    </div>

    <input type="file" id="fileInput" style="display:none;">
  </div>

  <script src="chat.js"></script>
  <script src="app.js"></script>
</body>
</html>
