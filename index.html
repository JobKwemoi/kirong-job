<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirong's AI </title>
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>⚡ Kirong's AI </h1>
      <button id="themeBtn" class="theme-toggle">🌙</button>
    </div>

    <div id="chatBox">
      <div class="message ai-message">
        <p>Hello! I am Kirong Job Kwemoi 🔥<br>Ask me anything</p>
      </div>
    </div>

    <div class="quick-btns">
      <button class="quick-btn" data-prompt="Write me code">💻 Code</button>
      <button class="quick-btn" data-prompt="Explain this">📚 Explain</button>
      <button class="quick-btn" data-prompt="Create image of">🎨 Create Image</button>
      <button class="quick-btn" data-prompt="Debate:">🎭 Debate</button>
      <button id="locationBtn" class="quick-btn">📍 Location</button>
    </div>

    <div class="input-area">
     <select id="voiceSelect">
  <option value="en-US">🇺🇸 English US</option>
  <option value="sw-TZ">🇹🇿 Kiswahili TZ</option>
</select>
      <button id="uploadBtn">📎</button>
      <input type="text" id="userInput" placeholder="Type or speak...">
      <button id="micBtn">🎤</button>
      <button id="sendBtn">Send</button>
    </div>

    <div class="footer-btns">
      <button id="exportBtn">📥 Export</button>
      <button id="clearBtn">🗑️ Clear</button>
    </div>

  </div>
  <input type="file" id="fileInput" style="display:none">
  <div id="typing" class="hidden">Kirong is typing...</div>
  <script src="app.js"></script>
</body>
</html>
