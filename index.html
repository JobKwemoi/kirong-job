<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kirong AI</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

<div class="container">

<header class="header">

<div class="headerLeft">

<h1>⚡ Kirong AI</h1>

<select id="languageSelect">

<option value="English">English</option>

<option value="Swahili">Kiswahili</option>

<option value="French">French</option>

<option value="Spanish">Spanish</option>

</select>

</div>

<button id="themeBtn">
🌙
</button>

</header>

<div id="chatBox">

<div class="message ai">

<p>

Hello 👋

I am <b>Kirong AI</b>.

How can I help you today?

</p>

</div>

</div>

<div id="thinking" class="hidden">

Kirong AI is thinking...

</div>

<div class="quickActions">

<button class="quickBtn" data-action="Code">
💻 Code
</button>

<button class="quickBtn" data-action="Explain">
🧠 Explain
</button>

<button class="quickBtn" data-action="Write">
✍️ Write
</button>

<button class="quickBtn" data-action="Image">
🎨 Image
</button>

<button class="quickBtn" data-action="Email">
📧 Email
</button>

<button id="locationBtn">
📍
</button>

</div>

<div class="inputArea">

<select id="voiceSelect">

<option value="en-US">

ENGLISH

</option>

<option value="sw-KE">

SWAHILI

</option>

</select>

<button id="uploadBtn">
📎
</button>

<input
type="file"
id="fileInput"
hidden
>

<input
type="text"
id="userInput"
placeholder="Type here..."
autocomplete="off"
>

<button id="micBtn">
🎤
</button>

<button id="sendBtn">

➤

</button>

</div>

<div class="footerButtons">

<button id="exportBtn">

Export 💾

</button>

<button id="clearBtn">

Clear 🗑️

</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
